Earning: 
  type: object
  properties: 
    id:
      type: number
      example: 1
    baseAmount:  
      type: number 
      example: 150000.00 
    periodStart:   
      type: date 
      example: "2023-01-01"
    periodEnd:   
      type: date 
      example: "2023-01-31" 
    userId:  
      type: number 
      example: 1 
                    
                